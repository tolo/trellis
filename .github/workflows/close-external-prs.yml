name: Close external PRs

on:
  pull_request_target:
    types: [opened]

jobs:
  close-if-external:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login != 'tolo'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `Thanks for your interest in Trellis! 🙏\n\nWe're not accepting pull requests at this stage — the project is still in early development and the architecture is changing rapidly.\n\nThat said, we'd love to hear your ideas! Please [open an issue](https://github.com/${context.repo.owner}/${context.repo.repo}/issues) instead and we'll be happy to discuss.\n\nClosing this automatically — nothing personal!`
            });
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              state: 'closed'
            });
