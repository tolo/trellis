<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title tl:text="${pageTitle}">Trellis + Shelf</title>
  <meta name="csrf-token" tl:attr="content=${csrfToken}" content="">
  <link rel="stylesheet" href="/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"
          integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz"
          crossorigin="anonymous"></script>
  <script>
    document.addEventListener('htmx:configRequest', function(evt) {
      var token = document.querySelector('meta[name="csrf-token"]').content;
      if (token) evt.detail.headers['X-CSRF-Token'] = token;
    });
  </script>
</head>
<body>
  <header>
    <nav tl:insert="~{partials/nav.html :: nav}"></nav>
  </header>

  <main id="content" tl:define="content">
    <p>Default content.</p>
  </main>

  <footer>
    <p>Built with <a href="https://pub.dev/packages/trellis">Trellis</a>
       + <a href="https://pub.dev/packages/shelf">Shelf</a>
       + <a href="https://htmx.org">HTMX</a></p>
  </footer>
</body>
</html>
