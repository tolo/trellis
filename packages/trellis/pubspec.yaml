name: trellis
description: >-
  Template engine for Dart, using natural HTML templates. Fragment-first for
  hypermedia-driven frameworks like HTMX. Inspired by Thymeleaf.
version: 0.7.0
repository: https://github.com/tolo/trellis/tree/main/packages/trellis
issue_tracker: https://github.com/tolo/trellis/issues
topics:
  - template
  - html
  - htmx
  - server-side-rendering
resolution: workspace

environment:
  sdk: ^3.10.0

dependencies:
  args: ^2.6.0
  html: ^0.15.6
  matcher: ^0.12.17
  path: ^1.9.0
  string_scanner: ^1.4.1

executables:
  validate: validate

dev_dependencies:
  test: ^1.25.0
  lints: ^6.0.0
  coverage: ^1.15.0
