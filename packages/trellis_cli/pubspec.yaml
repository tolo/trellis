name: trellis_cli
version: 0.2.0
description: >-
  CLI tool for the Trellis template engine — project scaffolding, static site
  build, and local development server.
repository: https://github.com/tolo/trellis/tree/main/packages/trellis_cli
resolution: workspace

environment:
  sdk: ^3.10.0

dependencies:
  args: ^2.7.0
  path: ^1.9.0
  shelf: ^1.4.0
  shelf_static: ^1.1.0
  trellis_css: ^0.1.0
  trellis_site: ^0.1.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0

executables:
  trellis: trellis
