name: trellis_workspace
publish_to: none
environment:
  sdk: ^3.10.0
workspace:
  - packages/trellis
  - packages/trellis_shelf
  - packages/trellis_dev
  - packages/trellis_cli
  - packages/trellis_css
  - packages/trellis_site
  - packages/trellis_dart_frog
  - packages/trellis_relic
  - examples/shelf_app
  - examples/todo_app
  - examples/relic_app
  - examples/dart_frog_app
dev_dependencies:
  melos: ^7.4.0

# Melos scripts require global activation to use `melos run <script>`:
#   dart pub global activate melos
# Alternative without global install (uses dart run melos exec directly):
#   dart run melos exec --dir-exists lib -- dart analyze --fatal-infos
#   dart run melos exec --dir-exists test --fail-fast --order-dependents -- dart test
melos:
  repository: https://github.com/tolo/trellis
  scripts:
    analyze:
      description: Run static analysis across all packages
      exec: dart analyze --fatal-infos
      packageFilters:
        dirExists: lib
    test:
      description: Run tests in all packages
      run: dart test
      exec:
        failFast: true
        orderDependents: true
      packageFilters:
        dirExists: test
    format:check:
      description: Check formatting across all packages
      exec: dart format --output none --set-exit-if-changed .
