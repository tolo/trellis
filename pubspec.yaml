name: trellis
description: >-
  A Thymeleaf-inspired HTML template engine for Dart. Natural HTML templates
  with tl:* attributes, fragment-first design for HTMX, AOT-compatible.
version: 0.1.0
repository: https://github.com/tolo/trellis
topics:
  - template
  - html
  - htmx
  - server-side-rendering

environment:
  sdk: ^3.7.0

dependencies:
  html: ^0.15.6
  string_scanner: ^1.4.1

dev_dependencies:
  test: ^1.25.0
  lints: ^5.1.1
  coverage: ^1.15.0
